<!DOCTYPE html>
<html>
<head>
<title>VirtualOffice Test</title>
<script>
// Mock window.electronAPI before any React code loads
window.electronAPI = {
  invoke: async (channel, args) => {
    if (channel === 'load_office_layout') {
      return JSON.stringify({
        version: 1,
        width: 32,
        height: 24,
        tiles: [
          // Floor tiles
          ...Array.from({length: 30}, (_, x) =>
            Array.from({length: 22}, (_, y) => ({x: x+1, y: y+1, type: 'floor'}))
          ).flat(),
          // Wall border
          ...Array.from({length: 32}, (_, x) => [{x, y: 0, type: 'wall'}, {x, y: 23, type: 'wall'}]).flat(),
          ...Array.from({length: 24}, (_, y) => [{x: 0, y, type: 'wall'}, {x: 31, y, type: 'wall'}]).flat(),
          // Desks
          {x: 5, y: 5, type: 'desk'}, {x: 8, y: 5, type: 'desk'},
          {x: 11, y: 5, type: 'desk'}, {x: 14, y: 5, type: 'desk'},
          {x: 5, y: 10, type: 'desk'}, {x: 8, y: 10, type: 'desk'},
        ]
      })
    }
    return null
  },
  on: () => {},
}
console.log('electronAPI mock set up')
</script>
</head>
<body style="margin:0;background:#000;width:100vw;height:100vh;display:flex">
<div id="root" style="flex:1"></div>
<script type="module">
// Load the actual React app bundle  
const script = document.createElement('script')
script.type = 'module'
script.src = '/src/main.jsx'
document.head.appendChild(script)
</script>
</body>
</html>
